<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- PapaParse CDN added correctly outside of the style tags -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0A1628;
  --navy-mid:#122040;
  --navy-light:#1a2d54;
  --navy-card:#0f1e3a;
  --clay:#C17F3E;
  --clay-light:#d4975a;
  --green:#2D5A27;
  --green-bright:#3a7a32;
  --chalk:#F5F0E8;
  --chalk-dim:#9a9080;
  --gold:#D4AF37;
  --gold-light:#e8ca55;
  --red:#e05252;
  --border:rgba(255,255,255,0.07);
}

body{
  background:var(--navy);
  color:var(--chalk);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HEADER ── */
.hdr{text-align:center;padding:22px 16px 0}
.hdr-eye{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--clay);margin-bottom:5px}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5.5vw,58px);letter-spacing:2px;line-height:1;color:var(--chalk)}
.hdr h1 span{color:var(--gold)}
.hdr-sub{font-size:12px;color:var(--chalk-dim);margin-top:5px;font-weight:300}

/* ── LAYOUT ── */
.wrap{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:20px;
  max-width:1080px;
  margin:18px auto 40px;
  padding:0 16px;
}
@media(max-width:720px){.wrap{grid-template-columns:1fr}}

/* ── SLOT MACHINE ── */
.slots-area{display:flex;flex-direction:column;align-items:center;gap:16px}

.slot-machine{
  display:flex;
  gap:12px;
  align-items:flex-start;
  background:var(--navy-card);
  border:1px solid var(--border);
  border-top:3px solid var(--gold);
  padding:20px 24px 24px;
  width:100%;
}

.slot-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.slot-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--clay)}

.slot-window{
  width:100%;
  height:72px;
  overflow:hidden;
  position:relative;
  background:#060e1c;
  border:1px solid var(--navy-light);
  border-radius:2px;
}
/* top/bottom fade */
.slot-window::before,.slot-window::after{
  content:'';position:absolute;left:0;right:0;z-index:2;pointer-events:none;
}
.slot-window::before{top:0;height:20px;background:linear-gradient(to bottom,#060e1c,transparent)}
.slot-window::after{bottom:0;height:20px;background:linear-gradient(to top,#060e1c,transparent)}

.slot-reel{
  display:flex;
  flex-direction:column;
  transition:transform 0s;
}
.slot-item{
  height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 8px;
  text-align:center;
}
.slot-item-inner{line-height:1.2}
.year-item{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--gold);letter-spacing:1px}
.player-item{font-size:12px;font-weight:600;color:var(--chalk)}
.player-item-sub{font-size:9px;color:var(--chalk-dim);font-family:'DM Mono',monospace;margin-top:2px}

/* center highlight bar */
.slot-highlight{
  position:absolute;
  top:50%;transform:translateY(-50%);
  left:0;right:0;height:72px;
  border-top:1px solid var(--gold);
  border-bottom:1px solid var(--gold);
  pointer-events:none;
  z-index:1;
}

.slot-divider{
  width:1px;
  background:var(--border);
  align-self:stretch;
  margin:0 4px;
}

/* ── SPIN BTN ── */
.spin-btn{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;
  letter-spacing:2px;
  background:var(--clay);
  color:var(--chalk);
  border:none;
  padding:13px 52px;
  cursor:pointer;
  transition:background .15s,transform .1s;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  width:100%;
  max-width:340px;
}
.spin-btn:hover:not(:disabled){background:var(--clay-light);transform:translateY(-1px)}
.spin-btn:active:not(:disabled){transform:translateY(0)}
.spin-btn:disabled{opacity:.38;cursor:not-allowed}

/* ── RESULT PANEL ── */
.result-panel{
  width:100%;
  background:var(--navy-card);
  border:1px solid var(--border);
  border-left:3px solid var(--gold);
  padding:16px 20px;
  display:none;
}
.result-panel.show{display:block}
.rp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.rp-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;line-height:1;color:var(--chalk)}
.rp-year{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold)}
.rp-meta{font-size:11px;color:var(--chalk-dim);margin-top:3px;font-family:'DM Mono',monospace}
.rp-badge{
  background:var(--navy-light);
  border:1px solid var(--gold);
  padding:6px 12px;
  text-align:center;
  flex-shrink:0;
}
.rp-badge-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);line-height:1}
.rp-badge-lbl{font-size:9px;color:var(--chalk-dim);font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase}

/* ── ATTRIBUTE GRID ── */
.attr-section{width:100%}
.attr-section-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--clay);margin-bottom:10px}

.attr-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:8px;
}

.attr-card{
  background:var(--navy-mid);
  border:1px solid var(--border);
  padding:12px 14px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:border-color .18s,transform .12s;
}
.attr-card::after{
  content:'';position:absolute;bottom:0;left:0;height:2px;width:0;
  background:var(--gold);transition:width .25s;
}
.attr-card:hover:not(.drafted)::after{width:100%}
.attr-card:hover:not(.drafted){border-color:rgba(212,175,55,.4);transform:translateY(-1px)}
.attr-card.drafted{
  opacity:.28;cursor:not-allowed;pointer-events:none;
}
.attr-card.drafted::after{display:none}

.ac-name{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--chalk-dim);margin-bottom:5px}
.ac-score{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;color:var(--chalk)}
.ac-score sup{font-size:13px;color:var(--chalk-dim)}
.ac-bar{background:rgba(255,255,255,0.07);height:3px;border-radius:2px;margin-top:7px}
.ac-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .5s ease}

/* color coding score bars */
.score-low .ac-fill{background:linear-gradient(90deg,#7a2020,#c45050)}
.score-mid .ac-fill{background:linear-gradient(90deg,#6b5010,var(--clay))}
.score-high .ac-fill{background:linear-gradient(90deg,var(--green),var(--gold))}

/* ── STATUS ── */
.status{
  font-size:12px;color:var(--chalk-dim);
  font-style:italic;text-align:center;min-height:18px;
}
.status.hi{color:var(--gold);font-style:normal;font-weight:500}

/* ── DRAFT BOARD ── */
.draft-board{
  background:var(--navy-card);
  border:1px solid var(--border);
  border-top:3px solid var(--clay);
  padding:18px;
  position:sticky;top:16px;height:fit-content;
}
.db-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--chalk)}
.db-sub{font-size:11px;color:var(--chalk-dim);font-weight:300;margin-bottom:14px}

.db-slot{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;
  border-bottom:1px solid var(--border);
}
.db-slot:last-of-type{border-bottom:none}

.db-icon{
  width:32px;height:32px;
  background:var(--navy-light);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;border-radius:2px;
}
.db-icon.filled{background:var(--green);border-color:var(--green-bright)}

.db-info{flex:1;min-width:0}
.db-attr-name{font-family:'DM Mono',monospace;font-size:9px;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:1px}
.db-player{font-size:12px;font-weight:600;color:var(--chalk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.db-empty{font-size:11px;color:rgba(255,255,255,.18);font-style:italic}
.db-score{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);flex-shrink:0}
.db-score.empty{color:rgba(255,255,255,.15)}

/* overall */
.db-overall{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
.db-ov-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.db-ov-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--clay);text-transform:uppercase;letter-spacing:2px}
.db-ov-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold)}
.db-ov-bar{background:rgba(255,255,255,.07);height:5px;border-radius:3px}
.db-ov-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--clay),var(--gold));transition:width .7s ease}

.reset-btn{
  margin-top:12px;width:100%;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  background:transparent;color:var(--chalk-dim);
  border:1px solid rgba(255,255,255,.09);padding:9px;cursor:pointer;
  transition:border-color .18s,color .18s;
}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

/* complete */
.complete-banner{
  display:none;
  background:linear-gradient(135deg,rgba(45,90,39,.6),rgba(18,32,64,.8));
  border:1px solid var(--gold);
  padding:12px 16px;text-align:center;margin-bottom:14px;
}
.complete-banner.show{display:block}
.complete-banner h3{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--gold)}
.complete-banner p{font-size:11px;color:var(--chalk-dim);margin-top:2px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-eye">ATP Top 10 (2000–2025)</div>
  <h1>BUILD THE GOAT</h1>
  <p class="hdr-sub">Spin and Choose Tennis Attributes to Win Big!</p>
</div>

<div class="wrap">

  <!-- LEFT -->
  <div class="slots-area">

    <!-- SLOT MACHINE -->
    <div class="slot-machine">
      <!-- YEAR reel -->
      <div class="slot-col">
        <div class="slot-label">Year</div>
        <div class="slot-window" id="sw-year">
          <div class="slot-highlight"></div>
          <div class="slot-reel" id="reel-year"></div>
        </div>
      </div>

      <div class="slot-divider"></div>

      <!-- PLAYER reel -->
      <div class="slot-col">
        <div class="slot-label">Player</div>
        <div class="slot-window" id="sw-player">
          <div class="slot-highlight"></div>
          <div class="slot-reel" id="reel-player"></div>
        </div>
      </div>
    </div>

    <p class="status" id="status">Loading tennis database...</p>
    <button class="spin-btn" id="spin-btn" onclick="doSpin()">▶ SPIN</button>

    <!-- RESULT -->
    <div class="result-panel" id="result-panel">
      <div class="rp-top">
        <div>
          <div class="rp-name" id="rp-name">—</div>
          <div class="rp-year" id="rp-year">—</div>
          <div class="rp-meta" id="rp-meta">—</div>
        </div>
        <div class="rp-badge">
          <div class="rp-badge-num" id="rp-rank">—</div>
          <div class="rp-badge-lbl">Year-end rank</div>
        </div>
      </div>
    </div>

    <!-- ATTRIBUTES -->
    <div class="attr-section" id="attr-section" style="display:none">
      <div class="attr-section-lbl">Pick an attribute to draft</div>
      <div class="attr-grid" id="attr-grid"></div>
    </div>

  </div>

  <!-- RIGHT: DRAFT BOARD -->
  <div class="draft-board">
    <div class="complete-banner" id="complete-banner">
      <h3>🏆 Build Complete!</h3>
      <p>Your ultimate player is assembled.</p>
    </div>
    <div class="db-title">Your Player</div>
    <div class="db-sub" id="db-sub">0 / 7 attributes drafted</div>
    <div id="db-slots"></div>
    <div class="db-overall">
      <div class="db-ov-row">
        <span class="db-ov-lbl">Avg Rating</span>
        <span class="db-ov-val" id="db-ov-val">—</span>
      </div>
      <div class="db-ov-bar"><div class="db-ov-fill" id="db-ov-fill" style="width:0%"></div></div>
    </div>
    <button class="reset-btn" onclick="resetGame()">↺ Start Over</button>
  </div>

</div>

<script>
// ── DATA AND CONFIG ─────────────────────────────────────────────────────────
let RAW = {};
let YEARS = [];

const ATTRS = [
  {key:'overall',  label:'Overall',  icon:'👑'},
  {key:'serve',    label:'Serve',    icon:'⚡'},
  {key:'return',   label:'Return',   icon:'🔄'},
  {key:'pressure', label:'Pressure', icon:'🔥'},
  {key:'forehand', label:'Forehand', icon:'🎾'},
  {key:'backhand', label:'Backhand', icon:'↩️'},
  {key:'volley',   label:'Volley',   icon:'🥅'},
];

const ITEM_H = 72;

// ── STATE ────────────────────────────────────────────────────────────────────
let state = {
  spinning: false,
  currentYear: null,
  currentPlayer: null,
  drafted: {},
};

// ── ENGINE INITIALIZATION ────────────────────────────────────────────────────
async function loadTennisData() {
  try {
    const response = await fetch('updated_tennis_data.csv');
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const csvText = await response.text();
    
    const parsed = Papa.parse(csvText, { 
      header: true, 
      dynamicTyping: true,
      skipEmptyLines: true 
    });
    
    parsed.data.forEach(row => {
      const year = row.year;
      const player = row.player_name;
      
      if (!year || !player) return;
      
      const yearStr = year.toString();
      if (!RAW[yearStr]) {
        RAW[yearStr] = {};
      }
      
      RAW[yearStr][player] = {
        rank: row.rank,
        country: row.player_country,
        overall: row.overall_score,
        serve: row.serve_score,
        return: row.return_score,
        pressure: row.pressure_score,
        forehand: row.forehand_score,
        backhand: row.backhand_score,
        volley: row.volley_score
      };
    });

    YEARS = Object.keys(RAW).sort();
    
    // UI Layout initialized safely only after data array is built
    initGame();
    
  } catch (error) {
    console.error("Error loading or parsing tennis CSV data:", error);
    document.getElementById('status').textContent = "Error loading live tennis database. Verify updated_tennis_data.csv exists.";
  }
}

function initGame() {
  buildYearReel();
  if (YEARS.length > 0) {
    buildPlayerReel(YEARS[0]);
  }
  setStatus('Spin to draw a player');
  renderDraftBoard();
}

// Fire async workflow on page load
window.onload = loadTennisData;

// ── REEL UI BUILDERS ─────────────────────────────────────────────────────────
function buildYearReel() {
  const reel = document.getElementById('reel-year');
  if (!reel || YEARS.length === 0) return;
  const items = [...YEARS,...YEARS,...YEARS];
  reel.innerHTML = items.map(y=>`
    <div class="slot-item">
      <div class="slot-item-inner year-item">${y}</div>
    </div>`).join('');
  reel.style.transform = `translateY(-${YEARS.length * ITEM_H}px)`;
}

function buildPlayerReel(year) {
  const reel = document.getElementById('reel-player');
  if (!reel || !RAW[year]) return;
  const players = Object.entries(RAW[year]).sort((a,b)=>a[1].rank-b[1].rank);
  const items = [...players,...players,...players];
  reel.innerHTML = items.map(([name,d])=>`
    <div class="slot-item">
      <div class="slot-item-inner">
        <div class="player-item">${name}</div>
        <div class="player-item-sub">${d.country} · #${d.rank}</div>
      </div>
    </div>`).join('');
  reel.style.transform = `translateY(-${players.length * ITEM_H}px)`;
}

// ── SPIN ENGINE ──────────────────────────────────────────────────────────────
function doSpin() {
  if (state.spinning) return;
  if (YEARS.length === 0) return;
  if (Object.keys(state.drafted).length === 7) {
    setStatus('All 7 attributes drafted! Start over to play again.', true);
    return;
  }

  state.spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('result-panel').classList.remove('show');
  document.getElementById('attr-section').style.display = 'none';
  setStatus('Spinning...');

  const targetYearIdx = Math.floor(Math.random() * YEARS.length);
  const targetYear = YEARS[targetYearIdx];
  const players = Object.entries(RAW[targetYear]).sort((a,b)=>a[1].rank-b[1].rank);
  const targetPlayerIdx = Math.floor(Math.random() * players.length);
  const [targetPlayerName, targetPlayerData] = players[targetPlayerIdx];

  buildPlayerReel(targetYear);

  spinReel('reel-year', YEARS.length, targetYearIdx, 4 + Math.random()*3, () => {});
  spinReel('reel-player', players.length, targetPlayerIdx, 5 + Math.random()*4, () => {
    state.spinning = false;
    state.currentYear = targetYear;
    state.currentPlayer = targetPlayerName;
    showResult(targetPlayerName, targetYear, targetPlayerData);
    document.getElementById('spin-btn').disabled = false;
  });
}

function spinReel(reelId, totalItems, targetIdx, extraSpins, onDone) {
  const reel = document.getElementById(reelId);
  const startOffset = totalItems * ITEM_H;
  const landOffset = totalItems * ITEM_H + targetIdx * ITEM_H;
  const totalScroll = extraSpins * totalItems * ITEM_H + (landOffset - startOffset);
  const endOffset = startOffset + totalScroll;
  const duration = 2200 + Math.random() * 800;
  const startTime = performance.now();

  reel.style.transition = 'none';
  reel.style.transform = `translateY(-${startOffset}px)`;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      function easeOut(t) { return 1 - Math.pow(1 - t, 3.5); }
      function step(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const offset = startOffset + (endOffset - startOffset) * easeOut(t);
        reel.style.transform = `translateY(-${offset}px)`;

        if (t < 1) {
          requestAnimationFrame(step);
        } else {
          reel.style.transform = `translateY(-${landOffset}px)`;
          onDone();
        }
      }
      requestAnimationFrame(step);
    });
  });
}

// ── RESULTS & CARD RENDERING ─────────────────────────────────────────────────
function showResult(name, year, data) {
  document.getElementById('rp-name').textContent = name;
  document.getElementById('rp-year').textContent = year;
  document.getElementById('rp-meta').textContent = `${data.country} · ${year} ATP Year-End`;
  document.getElementById('rp-rank').textContent = `#${data.rank}`;
  document.getElementById('result-panel').classList.add('show');

  renderAttrCards(data);
  document.getElementById('attr-section').style.display = 'block';

  const remaining = 7 - Object.keys(state.drafted).length;
  setStatus(`Pick an attribute from ${name} (${year}) · ${remaining} left to draft`, true);
}

function scoreClass(v) {
  if (v < 3.5) return 'score-low';
  if (v < 6.5) return 'score-mid';
  return 'score-high';
}

function renderAttrCards(data) {
  const grid = document.getElementById('attr-grid');
  grid.innerHTML = '';
  ATTRS.forEach(a => {
    const score = data[a.key];
    const isDrafted = !!state.drafted[a.key];
    const pct = (score / 10) * 100;
    const sc = scoreClass(score);
    const card = document.createElement('div');
    card.className = `attr-card ${sc}${isDrafted ? ' drafted' : ''}`;
    card.innerHTML = `
      <div class="ac-name">${a.icon} ${a.label}</div>
      <div class="ac-score">${score.toFixed(1)}<sup>/10</sup></div>
      <div class="ac-bar"><div class="ac-fill" style="width:${pct}%"></div></div>`;
    if (!isDrafted) card.onclick = () => draftAttr(a, score);
    grid.appendChild(card);
  });
}

// ── DRAFT BOARD ENGINE ───────────────────────────────────────────────────────
function draftAttr(attr, score) {
  state.drafted[attr.key] = {
    player: state.currentPlayer,
    year: state.currentYear,
    score,
    label: attr.label,
    icon: attr.icon,
  };
  renderDraftBoard();
  const data = RAW[state.currentYear][state.currentPlayer];
  renderAttrCards(data);

  const remaining = 7 - Object.keys(state.drafted).length;
  if (remaining === 0) {
    setStatus('🏆 Player complete! Your GOAT is assembled.', true);
    document.getElementById('complete-banner').classList.add('show');
    document.getElementById('spin-btn').disabled = true;
  } else {
    setStatus(`${attr.label} drafted! ${remaining} attribute${remaining!==1?'s':''} remaining — spin again.`, true);
  }
}

function renderDraftBoard() {
  const container = document.getElementById('db-slots');
  if (!container) return;
  container.innerHTML = '';
  let total = 0, count = 0;

  if (typeof ATTRS !== 'undefined' && Array.isArray(ATTRS)) {
    ATTRS.forEach(a => {
      const d = state.drafted[a.key];
      const slot = document.createElement('div');
      slot.className = 'db-slot';
      if (d) {
        total += d.score; count++;
        slot.innerHTML = `
          <div class="db-icon filled">${a.icon}</div>
          <div class="db-info">
            <div class="db-attr-name">${a.label}</div>
            <div class="db-player">${d.player} '${String(d.year).slice(-2)}</div>
          </div>
          <div class="db-score">${d.score.toFixed(1)}</div>`;
      } else {
        slot.innerHTML = `
          <div class="db-icon">${a.icon}</div>
          <div class="db-info">
            <div class="db-attr-name">${a.label}</div>
            <div class="db-empty">Not drafted</div>
          </div>
          <div class="db-score empty">—</div>`;
      }
      container.appendChild(slot);
    });
  }

  const subEl = document.getElementById('db-sub');
  if (subEl) subEl.textContent = `${count} / 7 attributes drafted`;

  const ovValEl = document.getElementById('db-ov-val');
  const ovFillEl = document.getElementById('db-ov-fill');

  if (count > 0) {
    const avg = (total / count).toFixed(2);
    if (ovValEl) ovValEl.textContent = avg;
    if (ovFillEl) ovFillEl.style.width = `${(avg/10)*100}%`;
  } else {
    if (ovValEl) ovValEl.textContent = '—';
    if (ovFillEl) ovFillEl.style.width = '0%';
  }
}

function resetGame() {
  state = {spinning:false, currentYear:null, currentPlayer:null, drafted:{}};
  document.getElementById('result-panel').classList.remove('show');
  document.getElementById('attr-section').style.display = 'none';
  document.getElementById('complete-banner').classList.remove('show');
  document.getElementById('spin-btn').disabled = false;
  document.getElementById('db-ov-val').textContent = '—';
  document.getElementById('db-ov-fill').style.width = '0%';
  buildYearReel();
  if (typeof YEARS !== 'undefined' && YEARS.length > 0) {
    buildPlayerReel(YEARS[0]);
  }
  setStatus('Spin to draw a player');
  renderDraftBoard();
}

function setStatus(msg, hi=false) {
  const el = document.getElementById('status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'status' + (hi ? ' hi' : '');
}
</script>
