<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0A1628;
  --navy-mid:#122040;
  --navy-light:#1a2d54;
  --navy-card:#0f1e3a;
  --clay:#C17F3E;
  --clay-light:#d4975a;
  --green:#2D5A27;
  --green-bright:#3a7a32;
  --chalk:#F5F0E8;
  --chalk-dim:#9a9080;
  --gold:#D4AF37;
  --gold-light:#e8ca55;
  --red:#e05252;
  --border:rgba(255,255,255,0.07);
}

body{
  background:var(--navy);
  color:var(--chalk);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── GAME SETUP MODAL OVERLAY ── */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(6, 14, 28, 0.95);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  transition: opacity 0.3s ease, visibility 0.3s ease;
}
.modal-overlay.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.modal-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-top: 3px solid var(--gold);
  max-width: 440px;
  width: 100%;
  padding: 32px 28px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
.modal-card h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 1.5px;
  color: var(--chalk);
  margin-bottom: 6px;
}
.modal-card p {
  font-size: 13px;
  color: var(--chalk-dim);
  margin-bottom: 24px;
}
.form-group {
  text-align: left;
  margin-bottom: 20px;
}
.form-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--clay);
  display: block;
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  background: var(--navy-mid);
  border: 1px solid var(--navy-light);
  color: var(--chalk);
  padding: 12px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus {
  border-color: var(--gold);
}
.toggle-wrapper {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--navy-mid);
  padding: 12px 14px;
  border: 1px solid var(--navy-light);
  cursor: pointer;
  user-select: none;
}
.toggle-info {
  display: flex;
  flex-direction: column;
  text-align: left;
}
.toggle-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--chalk);
}
.toggle-desc {
  font-size: 11px;
  color: var(--chalk-dim);
  margin-top: 2px;
}
.switch {
  position: relative;
  display: inline-block;
  width: 38px;
  height: 20px;
  flex-shrink: 0;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background-color: var(--navy-light);
  transition: .2s;
  border-radius: 2px;
}
.slider:before {
  position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
  background-color: var(--chalk-dim);
  transition: .2s;
  border-radius: 1px;
}
.switch input:checked + .slider { background-color: var(--green); }
.switch input:checked + .slider:before {
  transform: translateX(18px);
  background-color: var(--chalk);
}
.start-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  background: var(--gold);
  color: var(--navy);
  border: none;
  padding: 12px;
  cursor: pointer;
  width: 100%;
  margin-top: 12px;
  transition: background 0.15s, transform 0.1s;
  clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.start-btn:hover { background: var(--gold-light); transform: translateY(-1px); }

/* ── SEASON SIMULATOR RESULTS OVERLAY ── */
.sim-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(6, 14, 28, 0.97);
  backdrop-filter: blur(10px);
  z-index: 110;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.sim-overlay.hidden { display: none; }
.sim-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-top: 3px solid var(--clay);
  max-width: 700px;
  width: 100%;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 30px 60px rgba(0,0,0,0.6);
}
.sim-header {
  padding: 24px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sim-header h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 1px;
  color: var(--chalk);
}
.sim-summary-strip {
  background: var(--navy-mid);
  padding: 16px 24px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.sim-summary-box .lbl {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  color: var(--chalk-dim);
  letter-spacing: 1px;
}
.sim-summary-box .val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--gold);
  margin-top: 2px;
}
.sim-scroll-body {
  padding: 20px 24px;
  overflow-y: auto;
  flex: 1;
}
.sim-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sim-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  padding: 10px 14px;
}
.sim-event-info { display: flex; flex-direction: column; }
.sim-event-name { font-size: 13px; font-weight: 600; color: var(--chalk); }
.sim-event-detail { font-size: 11px; color: var(--chalk-dim); margin-top: 2px; }
.sim-event-points { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--green-bright); text-align: right; }
.sim-event-points.won { color: var(--gold); font-weight: bold; }
.sim-close-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  background: var(--red);
  color: var(--chalk);
  border: none;
  padding: 10px 24px;
  cursor: pointer;
  clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
}
.sim-close-btn:hover { background: #ff6363; }

/* ── HEADER ── */
.hdr{text-align:center;padding:22px 16px 0}
.hdr-eye{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--clay);margin-bottom:5px}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5.5vw,58px);letter-spacing:2px;line-height:1;color:var(--chalk)}
.hdr h1 span{color:var(--gold)}
.hdr-sub{font-size:12px;color:var(--chalk-dim);margin-top:5px;font-weight:300}

/* ── LAYOUT ── */
.wrap{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:20px;
  max-width:1080px;
  margin:18px auto 40px;
  padding:0 16px;
}
@media(max-width:720px){.wrap{grid-template-columns:1fr}}

/* ── SLOT MACHINE ── */
.slots-area{display:flex;flex-direction:column;align-items:center;gap:16px}

.slot-reel {
  display: flex;
  flex-direction: column;
  transition: transform 2.8s cubic-bezier(0.15, 0.85, 0.35, 1);
  will-change: transform;
}

.slot-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.slot-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--clay)}

.slot-window{
  width:100%;
  height:72px;
  overflow:hidden;
  position:relative;
  background:#060e1c;
  border:1px solid var(--navy-light);
  border-radius:2px;
}
.slot-window::before,.slot-window::after{
  content:'';position:absolute;left:0;right:0;z-index:2;pointer-events:none;
}
.slot-window::before{top:0;height:20px;background:linear-gradient(to bottom,#060e1c,transparent)}
.slot-window::after{bottom:0;height:20px;background:linear-gradient(to top,#060e1c,transparent)}

.slot-item{
  height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 8px;
  text-align:center;
}
.slot-item-inner{line-height:1.2}
.year-item{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--gold);letter-spacing:1px}
.player-item{font-size:12px;font-weight:600;color:var(--chalk)}
.player-item-sub{font-size:9px;color:var(--chalk-dim);font-family:'DM Mono',monospace;margin-top:2px}

.slot-highlight{
  position:absolute;
  top:50%;transform:translateY(-50%);
  left:0;right:0;height:72px;
  border-top:1px solid var(--gold);
  border-bottom:1px solid var(--gold);
  pointer-events:none;
  z-index:1;
}

.slot-divider{
  width:1px;
  background:var(--border);
  align-self:stretch;
  margin:0 4px;
}

/* ── SPIN BTN ── */
.spin-btn{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;
  letter-spacing:2px;
  background:var(--clay);
  color:var(--chalk);
  border:none;
  padding:13px 52px;
  cursor:pointer;
  transition:background .15s,transform .1s;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  width:100%;
  max-width:340px;
}
.spin-btn:hover:not(:disabled){background:var(--clay-light);transform:translateY(-1px)}
.spin-btn:active:not(:disabled){transform:translateY(0)}
.spin-btn:disabled{opacity:.38;cursor:not-allowed}

/* ── RESULT PANEL ── */
.result-panel{
  width:100%;
  background:var(--navy-card);
  border:1px solid var(--border);
  border-left:3px solid var(--gold);
  padding:16px 20px;
  display:none;
}
.result-panel.show{display:block}
.rp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.rp-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;line-height:1;color:var(--chalk)}
.rp-year{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold)}
.rp-meta{font-size:11px;color:var(--chalk-dim);margin-top:3px;font-family:'DM Mono',monospace}
.rp-badge{
  background:var(--navy-light);
  border:1px solid var(--gold);
  padding:6px 12px;
  text-align:center;
  flex-shrink:0;
}
.rp-badge-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);line-height:1}
.rp-badge-lbl">Year-end rank</div>
        </div>
      </div>
    </div>

    <div class="attr-section" id="attr-section" style="display:none">
      <div class="attr-section-lbl">Pick an attribute to draft</div>
      <div class="attr-grid" id="attr-grid"></div>
    </div>

  </div>

  <div class="draft-board">
    <div class="complete-banner" id="complete-banner">
      <h3>🏆 Build Complete!</h3>
      <p>Your ultimate player is assembled.</p>
      <button class="start-btn" id="sim-season-btn" style="background:var(--green); color:var(--chalk); margin-top:8px;" onclick="simulateSeason()">⚡ Simulate Season</button>
    </div>
    <div class="db-title" id="db-player-title">Your Player</div>
    <div class="db-sub" id="db-sub">0 / 8 attributes drafted</div>
    <div id="db-slots"></div>
    <div class="db-overall">
      <div class="db-ov-row">
        <span class="db-ov-lbl">Avg Rating</span>
        <span class="db-ov-val" id="db-ov-val">—</span>
      </div>
      <div class="db-ov-bar"><div class="db-ov-fill" id="db-ov-fill" style="width:0%"></div></div>
    </div>
    <button class="reset-btn" onclick="resetGame()">↺ Start Over</button>
  </div>

</div>

<!-- ── SEASON SIMULATION PERFORMANCE OVERLAY ── -->
<div class="sim-overlay hidden" id="sim-modal">
  <div class="sim-card">
    <div class="sim-header">
      <h2 id="sim-title-name">Season Performance</h2>
      <button class="sim-close-btn" onclick="closeSimModal()">Close Results</button>
    </div>
    <div class="sim-summary-strip">
      <div class="sim-summary-box">
        <div class="lbl">Final Points</div>
        <div class="val" id="sim-final-pts">0</div>
      </div>
      <div class="sim-summary-box">
        <div class="lbl">Year-End Rank</div>
        <div class="val" id="sim-final-rank">—</div>
      </div>
      <div class="sim-summary-box">
        <div class="lbl">Titles Won</div>
        <div class="val" id="sim-final-titles">0</div>
      </div>
    </div>
    <div class="sim-scroll-body">
      <div class="sim-grid" id="sim-results-grid"></div>
    </div>
  </div>
</div>

<script>
// ── DATA AND CONFIG ─────────────────────────────────────────────────────────
let RAW = {};
let YEARS = [];
let TOP_PLAYERS = [];
let SCORES_BO3 = [];
let SCORES_BO5 = [];

const ATTRS = [
  {key:'overall',  label:'Overall',  icon:'👑'},
  {key:'serve',    label:'Serve',    icon:'⚡'},
  {key:'return',   label:'Return',   icon:'🔄'},
  {key:'pressure', label:'Pressure', icon:'🔥'},
  {key:'forehand', label:'Forehand', icon:'🎾'},
  {key:'backhand', label:'Backhand', icon:'↩️'},
  {key:'volley',   label:'Volley',   icon:'🥅'},
  {key:'movement', label:'Movement', icon:'🏃'}
];

const TOURNEY_SCHEDULE = [
  { name: "Australian Open", type: "Slam" },
  { name: "Indian Wells Open", type: "Masters" },
  { name: "Miami Open", type: "Masters" },
  { name: "Monte-Carlo Masters", type: "Masters" },
  { name: "Madrid Open", type: "Masters" },
  { name: "Italian Open", type: "Masters" },
  { name: "French Open", type: "Slam" },
  { name: "Wimbledon", type: "Slam" },
  { name: "Canadian Open", type: "Masters" },
  { name: "Cincinnati Open", type: "Masters" },
  { name: "US Open", type: "Slam" },
  { name: "Shanghai Masters", type: "Masters" },
  { name: "Paris Masters", type: "Masters" },
  { name: "ATP Finals", type: "Finals" }
];

const ITEM_H = 72;

// ── STATE ────────────────────────────────────────────────────────────────────
let state = {
  spinning: false,
  currentYear: null,
  currentPlayer: null,
  drafted: {},
  hasDraftedThisSpin: false,
  playerName: "Your Player",
  hardMode: false,
  calculatedOverall: 0
};

// ── MODAL SETUP ENGINE ───────────────────────────────────────────────────────
function toggleHardModeSwitch() {
  const cb = document.getElementById('hard-mode-checkbox');
  cb.checked = !cb.checked;
}

function startGameSession() {
  let nameInput = document.getElementById('player-name-input').value.trim();
  if (nameInput.length === 0) nameInput = "Your Player";
  
  state.playerName = nameInput.substring(0, 20);
  state.hardMode = document.getElementById('hard-mode-checkbox').checked;
  
  document.getElementById('db-player-title').textContent = state.playerName;
  document.getElementById('setup-modal').classList.add('hidden');
}

// ── ENGINE INITIALIZATION & DATA LOADING ─────────────────────────────────────
async function loadTennisData() {
  try {
    // Load Core Historical Attributes Database
    const response = await fetch('./final_data');
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const csvText = await response.text();
    
    Papa.parse(csvText, { 
      header: true, dynamicTyping: true, skipEmptyLines: true,
      step: function(row) {
        const r = row.data;
        if (!r.year || !r.player_name) return;
        const yStr = r.year.toString();
        if (!RAW[yStr]) RAW[yStr] = {};
        RAW[yStr][r.player_name] = {
          rank: r.rank, country: r.player_country, overall: r.overall_score,
          serve: r.serve_score, return: r.return_score, pressure: r.pressure_score,
          forehand: r.forehand_score, backhand: r.backhand_score, volley: r.net_game_score,     
          movement: r.movement_score    
        };
      },
      complete: function() {
        YEARS = Object.keys(RAW).sort();
        initGame();
      }
    });

    // Async Fetch Supporting Simulation Datasets from Github Pipelines
    fetch('./current_top_players').then(res => res.text()).then(txt => {
      TOP_PLAYERS = Papa.parse(txt, { header: true, dynamicTyping: true, skipEmptyLines: true }).data;
    });
    fetch('./tennis_best_of_three_all_scores').then(res => res.text()).then(txt => {
      SCORES_BO3 = Papa.parse(txt, { header: true, skipEmptyLines: true }).data;
    });
    fetch('./tennis_best_of_five_all_scores').then(res => res.text()).then(txt => {
      SCORES_BO5 = Papa.parse(txt, { header: true, skipEmptyLines: true }).data;
    });
    
  } catch (error) {
    console.error("Error loading base file dependencies:", error);
    document.getElementById('status').textContent = "Initialization error. Check CSV database links.";
  }
}

function initGame() {
  buildYearReel();
  if (YEARS.length > 0) buildPlayerReel(YEARS[0]);
  setStatus('Spin to draw a player');
  renderDraftBoard();
}

window.onload = loadTennisData;

// ── REEL UI BUILDERS ─────────────────────────────────────────────────────────
function buildYearReel() {
  const reel = document.getElementById('reel-year');
  if (!reel || YEARS.length === 0) return;
  const items = [...YEARS,...YEARS,...YEARS];
  reel.innerHTML = items.map(y=>`<div class="slot-item"><div class="slot-item-inner year-item">${y}</div></div>`).join('');
  reel.style.transform = `translate3d(0, -${YEARS.length * ITEM_H}px, 0)`;
}

function buildPlayerReel(year) {
  const reel = document.getElementById('reel-player');
  if (!reel || !RAW[year]) return;
  const players = Object.entries(RAW[year]).sort((a,b)=>a[1].rank-b[1].rank);
  const items = [...players,...players,...players];
  reel.innerHTML = items.map(([name,d])=>`
    <div class="slot-item">
      <div class="slot-item-inner">
        <div class="player-item">${name}</div>
        <div class="player-item-sub">${d.country} · #${d.rank}</div>
      </div>
    </div>`).join('');
  reel.style.transform = `translate3d(0, -${players.length * ITEM_H}px, 0)`;
}

// ── SPIN ENGINE ──────────────────────────────────────────────────────────────
function doSpin() {
  if (state.spinning) return;
  if (YEARS.length === 0) return;
  
  if (Object.keys(state.drafted).length === 8) {
    setStatus('All 8 attributes drafted! Start over to play again.', true);
    return;
  }

  state.spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('result-panel').classList.remove('show');
  document.getElementById('attr-section').style.display = 'none';
  state.hasDraftedThisSpin = false;
  setStatus('Spinning...');

  const targetYearIdx = Math.floor(Math.random() * YEARS.length);
  const targetYear = YEARS[targetYearIdx];
  const players = Object.entries(RAW[targetYear]).sort((a,b)=>a[1].rank-b[1].rank);
  const targetPlayerIdx = Math.floor(Math.random() * players.length);
  const [targetPlayerName, targetPlayerData] = players[targetPlayerIdx];

  buildPlayerReel(targetYear);
  const activeYearReel = spinReelCSS('reel-year', YEARS.length, targetYearIdx, 3);
  
  spinReelCSS('reel-player', players.length, targetPlayerIdx, 4, () => {
    state.spinning = false;
    state.currentYear = targetYear;
    state.currentPlayer = targetPlayerName;
    
    if (activeYearReel) {
      activeYearReel.style.transition = 'none';
      activeYearReel.style.transform = `translate3d(0, -${(YEARS.length + targetYearIdx) * ITEM_H}px, 0)`;
    }

    showResult(targetPlayerName, targetYear, targetPlayerData);
    document.getElementById('spin-btn').disabled = false;
  });
}

function spinReelCSS(reelId, totalItems, targetIdx, loops, onDone) {
  const reel = document.getElementById(reelId);
  if (!reel) return null;
  const newReel = reel.cloneNode(true);
  reel.parentNode.replaceChild(newReel, reel);
  const startOffset = totalItems * ITEM_H;
  const landOffset = startOffset + (targetIdx * ITEM_H);
  const finalScrollDistance = (loops * totalItems * ITEM_H) + landOffset;

  newReel.style.transition = 'none';
  newReel.style.transform = `translate3d(0, -${startOffset}px, 0)`;
  newReel.offsetHeight;
  newReel.style.transition = 'transform 2.8s cubic-bezier(0.15, 0.85, 0.35, 1)';
  newReel.style.transform = `translate3d(0, -${finalScrollDistance}px, 0)`;

  if (onDone) {
    newReel.addEventListener('transitionend', function handleEnd(e) {
      if (e.propertyName === 'transform') {
        newReel.removeEventListener('transitionend', handleEnd);
        newReel.style.transition = 'none';
        newReel.style.transform = `translate3d(0, -${startOffset + (targetIdx * ITEM_H)}px, 0)`;
        onDone();
      }
    });
  }
  return newReel;
}

function showResult(name, year, data) {
  document.getElementById('rp-name').textContent = name;
  document.getElementById('rp-year').textContent = year;
  document.getElementById('rp-meta').textContent = `${data.country} · ${year} ATP Year-End`;
  document.getElementById('rp-rank').textContent = `#${data.rank}`;
  document.getElementById('result-panel').classList.add('show');

  renderAttrCards(data);
  document.getElementById('attr-section').style.display = 'block';
  const remaining = 8 - Object.keys(state.drafted).length;
  setStatus(`Pick an attribute from ${name} (${year}) · ${remaining} left to draft`, true);
}

function scoreClass(v) {
  if (v < 3.5) return 'score-low';
  if (v < 6.5) return 'score-mid';
  return 'score-high';
}

function renderAttrCards(data) {
  const grid = document.getElementById('attr-grid');
  grid.innerHTML = '';
  
  ATTRS.forEach(a => {
    const score = data[a.key];
    const isThisCardDrafted = !!state.drafted[a.key];
    const isLockedOut = isThisCardDrafted || state.hasDraftedThisSpin; 
    const pct = (score / 10) * 100;
    
    const displayScore = (state.hardMode) ? "???" : score.toFixed(1);
    const sc = (state.hardMode) ? "score-hidden" : scoreClass(score);
    
    const card = document.createElement('div');
    card.className = `attr-card ${sc}${isLockedOut ? ' drafted' : ''}`;
    card.innerHTML = `
      <div class="ac-name">${a.icon} ${a.label}</div>
      <div class="ac-score">${displayScore}${state.hardMode ? '' : '<sup>/10</sup>'}</div>
      <div class="ac-bar"><div class="ac-fill" style="width:${state.hardMode ? '100' : pct}%"></div></div>`;
    
    if (!isLockedOut) card.onclick = () => draftAttr(a, score);
    grid.appendChild(card);
  });
}

// ── DRAFT BOARD ENGINE ───────────────────────────────────────────────────────
function draftAttr(attr, score) {
  if (state.hasDraftedThisSpin) return;
  state.hasDraftedThisSpin = true;

  state.drafted[attr.key] = {
    player: state.currentPlayer, year: state.currentYear, score, label: attr.label, icon: attr.icon,
  };
  
  renderDraftBoard();
  const data = RAW[state.currentYear][state.currentPlayer];
  renderAttrCards(data);

  const remaining = 8 - Object.keys(state.drafted).length;
  if (remaining === 0) {
    setStatus('🏆 Player complete! Your GOAT is assembled.', true);
    document.getElementById('complete-banner').classList.add('show');
    document.getElementById('spin-btn').disabled = true;
  } else {
    setStatus(`${attr.label} drafted! Spin again to unlock your next selection.`, true);
  }
}

function renderDraftBoard() {
  const container = document.getElementById('db-slots');
  if (!container) return;
  container.innerHTML = '';
  let total = 0, count = 0;

  ATTRS.forEach(a => {
    const d = state.drafted[a.key];
    const slot = document.createElement('div');
    slot.className = 'db-slot';
    if (d) {
      total += d.score; count++;
      slot.innerHTML = `
        <div class="db-icon filled">${a.icon}</div>
        <div class="db-info">
          <div class="db-attr-name">${a.label}</div>
          <div class="db-player">${d.player} '${String(d.year).slice(-2)}</div>
        </div>
        <div class="db-score">${d.score.toFixed(1)}</div>`;
    } else {
      slot.innerHTML = `
        <div class="db-icon">${a.icon}</div>
        <div class="db-info">
          <div class="db-attr-name">${a.label}</div>
          <div class="db-empty">Not drafted</div>
        </div>
        <div class="db-score empty">—</div>`;
    }
    container.appendChild(slot);
  });

  const subEl = document.getElementById('db-sub');
  if (subEl) subEl.textContent = `${count} / 8 attributes drafted`;

  const ovValEl = document.getElementById('db-ov-val');
  const ovFillEl = document.getElementById('db-ov-fill');

  if (count > 0) {
    const avg = total / count;
    state.calculatedOverall = avg;
    if (ovValEl) ovValEl.textContent = avg.toFixed(2);
    if (ovFillEl) ovFillEl.style.width = `${(avg/10)*100}%`;
  } else {
    state.calculatedOverall = 0;
    if (ovValEl) ovValEl.textContent = '—';
    if (ovFillEl) ovFillEl.style.width = '0%';
  }
}

// ── SEASON SIMULATION LOGIC ──────────────────────────────────────────────────
function getOpponent(lowRank, highRank) {
  if (!TOP_PLAYERS || TOP_PLAYERS.length === 0) return { player_name: "Random Qualifier", rank: 78 };
  const pool = TOP_PLAYERS.filter(p => p.rank >= lowRank && p.rank <= highRank);
  if (pool.length === 0) return TOP_PLAYERS[Math.floor(Math.random() * TOP_PLAYERS.length)];
  return pool[Math.floor(Math.random() * pool.length)];
}

function getScore(isWin, isBestOfFive) {
  const pool = isBestOfFive ? SCORES_BO5 : SCORES_BO3;
  const targetType = isWin ? 'W' : 'L';
  const matching = pool.filter(s => s.result === targetType);
  if (matching.length === 0) return isWin ? "6-4 6-3" : "4-6 3-6";
  return matching[Math.floor(Math.random() * matching.length)].score;
}

function calculateRank(points) {
  if (points >= 11000) return "1";
  if (points >= 8500) return "2";
  if (points >= 6500) return "3";
  if (points >= 5000) return "4";
  if (points >= 4000) return "5";
  if (points >= 3300) return "8";
  if (points >= 2500) return "12";
  if (points >= 1800) return "20";
  if (points >= 1200) return "35";
  if (points >= 800) return "50";
  return "100+";
}

function simulateSeason() {
  const pMatch = state.calculatedOverall / 10;
  let accumulatedPoints = 0;
  let titlesCount = 0;
  const resultsGrid = document.getElementById('sim-results-grid');
  resultsGrid.innerHTML = '';

  TOURNEY_SCHEDULE.forEach(event => {
    let roundReached = "";
    let basePointsWon = 0;
    let opponent = "";
    let scoreDisplay = "";
    let totalRounds = event.type === "Slam" ? 7 : (event.type === "Finals" ? 5 : 6);
    let isBestOfFive = event.type === "Slam";
    let ranWinCount = 0;

    // Simulate match arrays sequentially round-by-round
    for (let r = 1; r <= totalRounds; r++) {
      if (Math.random() <= pMatch) {
        ranWinCount++;
      } else {
        break;
      }
    }

    if (event.type === "Slam") {
      const slamPoints = [0, 10, 50, 100, 200, 400, 800, 1300, 2000];
      basePointsWon = slamPoints[ranWinCount];
      
      if (ranWinCount === 7) {
        roundReached = "Champion 🏆"; titlesCount++;
        opponent = getOpponent(1, 10);
        scoreDisplay = getScore(true, isBestOfFive);
      } else {
        roundReached = `Lost in R${ranWinCount + 1}`;
        if (ranWinCount === 6) roundReached = "Runner-Up 🥈";
        
        if (ranWinCount < 2) opponent = getOpponent(51, 100);
        else if (ranWinCount < 4) opponent = getOpponent(11, 50);
        else opponent = getOpponent(1, 10);
        scoreDisplay = getScore(false, isBestOfFive);
      }
    } else if (event.type === "Masters") {
      const mastersPoints = [0, 10, 30, 50, 100, 200, 400, 650, 1000];
      basePointsWon = mastersPoints[ranWinCount];

      if (ranWinCount === 6) {
        roundReached = "Champion 🏆"; titlesCount++;
        opponent = getOpponent(1, 10);
        scoreDisplay = getScore(true, isBestOfFive);
      } else {
        roundReached = `Lost in R${ranWinCount + 1}`;
        if (ranWinCount === 5) roundReached = "Runner-Up 🥈";
        
        if (ranWinCount < 2) opponent = getOpponent(51, 100);
        else if (ranWinCount < 4) opponent = getOpponent(11, 50);
        else opponent = getOpponent(1, 10);
        scoreDisplay = getScore(false, isBestOfFive);
      }
    } else if (event.type === "Finals") {
      // Tour Finals Custom Logic Engine
      if (ranWinCount < 3) {
        roundReached = "Lost in Group Stage";
        basePointsWon = ranWinCount * 200;
        opponent = null;
        scoreDisplay = "";
      } else if (ranWinCount === 3) {
        roundReached = "Lost in Semifinals";
        basePointsWon = 400;
        opponent = getOpponent(1, 10);
        scoreDisplay = getScore(false, isBestOfFive);
      } else if (ranWinCount === 4) {
        roundReached = "Runner-Up 🥈";
        basePointsWon = 800;
        opponent = getOpponent(1, 10);
        scoreDisplay = getScore(false, isBestOfFive);
      } else {
        roundReached = "Champion 🏆"; titlesCount++;
        basePointsWon = 1500;
        opponent = getOpponent(1, 10);
        scoreDisplay = getScore(true, isBestOfFive);
      }
    }

    accumulatedPoints += basePointsWon;

    // Render Simulation Card HTML Nodes Inline
    const row = document.createElement('div');
    row.className = 'sim-row';
    
    let detailText = opponent ? `${roundReached} to ${opponent.player_name} (#${opponent.rank}) · Score: ${scoreDisplay}` : roundReached;
    if (roundReached.includes("Champion")) {
      detailText = `Defeated ${opponent.player_name} (#${opponent.rank}) in Final · Score: ${scoreDisplay}`;
    }

    row.innerHTML = `
      <div class="sim-event-info">
        <span class="sim-event-name">${event.name}</span>
        <span class="sim-event-detail">${detailText}</span>
      </div>
      <div class="sim-event-points ${roundReached.includes("Champion") ? 'won' : ''}">+${basePointsWon} pts</div>
    `;
    resultsGrid.appendChild(row);
  });

  // Execute Bonus Points Modifier Expression
  const bonusPoints = Math.round((state.calculatedOverall / 10) * 3000);
  const totalSeasonPoints = accumulatedPoints + bonusPoints;
  const finalYearEndRank = calculateRank(totalSeasonPoints);

  // Bind Metrics out to display fields
  document.getElementById('sim-title-name').textContent = `${state.playerName} · Career Season Results`;
  document.getElementById('sim-final-pts').textContent = totalSeasonPoints.toLocaleString();
  document.getElementById('sim-final-rank').textContent = `#${finalYearEndRank}`;
  document.getElementById('sim-final-titles').textContent = titlesCount;

  // Render bonus row element block inside scrolling element container
  const bonusRow = document.createElement('div');
  bonusRow.className = 'sim-row';
  bonusRow.style.borderLeft = "3px solid var(--gold)";
  bonusRow.innerHTML = `
    <div class="sim-event-info">
      <span class="sim-event-name" style="color:var(--gold);">Overall Metric Baseline Bonus</span>
      <span class="sim-event-detail">Algorithmic simulation scalar bonus index from profile ratings evaluation</span>
    </div>
    <div class="sim-event-points" style="color:var(--gold);">+${bonusPoints} pts</div>
  `;
  resultsGrid.appendChild(bonusRow);

  document.getElementById('sim-modal').classList.remove('hidden');
}

function closeSimModal() {
  document.getElementById('sim-modal').classList.add('hidden');
}

function resetGame() {
  const savedPlayerName = state.playerName;
  const savedHardMode = state.hardMode;

  state = {
    spinning: false, currentYear: null, currentPlayer: null, drafted: {}, hasDraftedThisSpin: false,
    playerName: savedPlayerName, hardMode: savedHardMode, calculatedOverall: 0
  };
  
  document.getElementById('result-panel').classList.remove('show');
  document.getElementById('attr-section').style.display = 'none';
  document.getElementById('complete-banner').classList.remove('show');
  document.getElementById('spin-btn').disabled = false;
  document.getElementById('db-ov-val').textContent = '—';
  document.getElementById('db-ov-fill').style.width = '0%';
  
  document.getElementById('player-name-input').value = savedPlayerName;
  document.getElementById('hard-mode-checkbox').checked = savedHardMode;
  document.getElementById('setup-modal').classList.remove('hidden');
  
  buildYearReel();
  if (typeof YEARS !== 'undefined' && YEARS.length > 0) buildPlayerReel(YEARS[0]);
  setStatus('Spin to draw a player');
  renderDraftBoard();
}

function setStatus(msg, hi=false) {
  const el = document.getElementById('status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'status' + (hi ? ' hi' : '');
}
</script>

<!-- INITIAL OVERLAY ENTRY CONTAINER GATES COORD START -->
<div class="modal-overlay" id="setup-modal">
  <div class="modal-card">
    <h2>Configure Your Legend</h2>
    <p>Setup your custom profile parameters before taking your first spin</p>
    
    <div class="form-group">
      <label class="form-label" for="player-name-input">Player Name</label>
      <input class="form-input" type="text" id="player-name-input" maxlength="20" placeholder="e.g. The Tennis GOAT" value="Your Player">
    </div>

    <div class="form-group">
      <label class="form-label">Difficulty Settings</label>
      <div class="toggle-wrapper" onclick="toggleHardModeSwitch()">
        <div class="toggle-info">
          <span class="toggle-title">Hard Mode</span>
          <span class="toggle-desc">Metric scores remain hidden until drafted</span>
        </div>
        <label class="switch" onclick="event.stopPropagation()">
          <input type="checkbox" id="hard-mode-checkbox">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <button class="start-btn" onclick="startGameSession()">Confirm & Start</button>
  </div>
</div>
